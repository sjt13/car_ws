amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: base_footprint
    global_frame_id: map
    odom_frame_id: odom
    scan_topic: scan
    robot_model_type: nav2_amcl::OmniMotionModel
    min_particles: 300
    max_particles: 1200
    pf_err: 0.05
    pf_z: 0.99
    update_min_d: 0.10
    update_min_a: 0.08
    resample_interval: 1
    transform_tolerance: 0.5
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    do_beamskip: false
    max_beams: 80
    laser_model_type: likelihood_field
    laser_likelihood_max_dist: 2.0
    sigma_hit: 0.2
    z_hit: 0.7
    z_rand: 0.3
    z_short: 0.05
    z_max: 0.05
    tf_broadcast: true
    save_pose_rate: 0.5

